services:
  # 1. Kafka và Zookeeper (Sử dụng Image chính thức của Confluent)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper

  # 2. HBase + Phoenix (Sử dụng Image chính thức của Cloudera)
  # Lưu ý: Cần ít nhất 4GB-6GB RAM cho container này
  hbase:
    image: cloudera/opdb-docker:latest
    container_name: docker-hbase-1
    hostname: opdb-docker
    ports:
      - "16010:16010" # Web UI
      - "9090:9090"   # Thrift (Cho Spark)
      - "8765:8765"   # Phoenix Query Server (Cho Giai đoạn 2)
    environment:
      - HBASE_CONF_hbase_zookeeper_quorum=zookeeper